<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Módulo Supervisor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS del módulo -->
  <link rel="stylesheet" th:href="@{/css/supervisor/supervisor.css}">

  <!-- CSRF -->
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
</head>

<body>
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo">
          <img th:src="@{/assets/logo.jpg}" alt="Logo">
        </div>
      </div>

      <nav class="nav" aria-label="Menú Supervisor">

        <!-- Proyectos -->
        <a class="nav-item active" th:href="@{/supervisor}">
          <span class="icon">
            <img th:src="@{/assets/iconos/proyectos.png}" alt="">
          </span>
          <span class="label">Proyectos</span>
        </a>

        <!-- Cerrar sesión -->
        <form th:action="@{/logout}" method="post" style="margin:0;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button class="nav-item" type="submit">
            <span class="icon">
              <img th:src="@{/assets/iconos/salir.png}" alt="">
            </span>
            <span class="label">Cerrar sesión</span>
          </button>
        </form>

      </nav>
    </aside>

    <!-- CONTENT -->
    <main class="content">

      <header class="topbar">
        <!-- Buscador visual-->
        <div class="search" role="search">
  <span class="s-icon" aria-hidden="true">
    <img th:src="@{/assets/iconos/buscar.png}" alt="">
  </span>
  <input id="searchSupervisor" type="search" placeholder="Buscar proyecto..." autocomplete="off" />
</div>

        <!-- Saludo -->
        <div class="userbox">
          <div class="hello">
            Hola, <span th:text="${nombreUsuario}">Usuario</span>!
            <div class="role-line">
              Rol: <span th:text="${rolUsuario}">supervisor</span>
            </div>
          </div>

          <!-- Foto (solo UI) -->
          <button class="profile" type="button" title="Perfil" th:attr="data-foto=${fotoUrl}">
            <img th:if="${fotoUrl != null}" th:src="${fotoUrl}" alt="Foto de perfil">
            <img th:if="${fotoUrl == null}" th:src="@{/assets/iconos/sinFotoPerfil.png}" alt="">
          </button>
        </div>
      </header>

      <section class="panel" aria-label="Sección principal">
  <div class="panel-head">
    <div>
      <h2 class="panel-title">Proyectos</h2>
      <div class="panel-sub">Aquí se mostrarán únicamente los proyectos asignados al supervisor</div>
    </div>

    <button class="add-btn" type="button" title="Sin acciones disponibles" disabled>
      <span class="add-plus">+</span>
    </button>
  </div>

  <div class="tabs" id="tabsSupervisor" role="tablist" aria-label="Filtros de proyectos">
    <button class="tab active" type="button" data-estado="ACTIVO">Activos</button>
    <button class="tab" type="button" data-estado="INACTIVO">Inactivos</button>
    <button class="tab" type="button" data-estado="FINALIZADO">Finalizados</button>
  </div>

  <div class="cards" id="supervisorProjectsList">
    <div class="empty" id="supervisorProjectsEmpty">
      Aún no hay proyectos asignados para mostrar.
    </div>
  </div>
</section>

    </main>
  </div>
  <div class="modal-backdrop" id="detalleBackdrop" aria-hidden="true"></div>

<div class="modal" id="detalleModal" role="dialog" aria-modal="true" aria-labelledby="detalleTitle" aria-hidden="true">
  <div class="modal-card">
    <div class="dg-head">
      <span class="dg-chip" id="detalleTitle">Detalle del proyecto</span>
      <div class="dg-actions">
        <button class="dg-close" type="button" id="btnCerrarDetalle" aria-label="Cerrar">✕</button>
      </div>
    </div>

    <div class="detalle-top">
      <div class="badge-state" id="badgeEstado">—</div>
      <div class="detalle-meta" id="detalleMeta"></div>
    </div>

    <div class="detalle-body" id="detalleBody"></div>
  </div>
</div>

<script th:src="@{/js/supervisor/supervisor.js}"></script>
</body>
</html>
