<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio de Sesión</title>
  
    <!-- CSS -->
  <link rel="stylesheet" th:href="@{/css/login/login.css}">

</head>
<body>
  <main class="page">
    <div class="logo-badge">
    
      <img class="logo-img" th:src="@{/assets/logo.jpg}" alt="Logo">
    </div>

    <h1>Inicio de Sesión</h1>

    <section class="card" aria-label="Formulario de inicio de sesión">

 
      <p class="msg err" th:if="${param.error}">Usuario o contraseña incorrectos.</p>
      <p class="msg ok" th:if="${param.logout}">Sesión cerrada correctamente.</p>
      <p class="msg err" th:if="${param.pending}">Tu cuenta está pendiente de aprobación por el administrador.</p>

      <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="field">
          <label for="username">Nombre de usuario</label>
          <input id="username" name="username" type="text" autocomplete="username" required />
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>

        <button class="btn" type="submit">Iniciar sesión</button>
      </form>
      
            <!-- Registro -->
      <p class="register">
        ¿No tienes cuenta? <a th:href="@{/registro}">Regístrate</a>
      </p>
    </section>
  </main>
</body>
</html>
