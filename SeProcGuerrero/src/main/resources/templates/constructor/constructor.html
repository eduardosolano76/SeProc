<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Módulo Constructor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS del módulo -->
  <link rel="stylesheet" th:href="@{/css/constructor/constructor.css}">

  <!-- CSRF -->
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
</head>

<body>
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo">
          <img th:src="@{/assets/logo.jpg}" alt="Logo">
        </div>
      </div>

      <nav class="nav" aria-label="Menú Constructor">

        <!-- Proyectos -->
        <a class="nav-item active" th:href="@{/constructor}">
          <span class="icon">
            <img th:src="@{/assets/iconos/proyectos.png}" alt="">
          </span>
          <span class="label">Proyectos</span>
        </a>

        <!-- Cerrar sesión -->
        <form th:action="@{/logout}" method="post" style="margin:0;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button class="nav-item" type="submit">
            <span class="icon">
              <img th:src="@{/assets/iconos/salir.png}" alt="">
            </span>
            <span class="label">Cerrar sesión</span>
          </button>
        </form>

      </nav>
    </aside>

    <!-- CONTENT -->
    <main class="content">

      <header class="topbar">
        <!-- Buscador visual-->
        <div class="search" role="search">
          <span class="s-icon" aria-hidden="true">
            <img th:src="@{/assets/iconos/buscar.png}" alt="">
          </span>
          <input type="search" placeholder="Buscar proyecto..." autocomplete="off" />
        </div>

        <!-- Saludo -->
        <div class="userbox">
          <div class="hello">
            Hola, <span th:text="${nombreUsuario}">Usuario</span>!
            <div class="role-line">
              Rol: <span th:text="${rolUsuario}">contratista</span>
            </div>
          </div>

          <!-- Foto (solo UI) -->
          <button class="profile" type="button" title="Perfil" th:attr="data-foto=${fotoUrl}">
            <img th:if="${fotoUrl != null}" th:src="${fotoUrl}" alt="Foto de perfil">
            <img th:if="${fotoUrl == null}" th:src="@{/assets/iconos/usuarios.png}" alt="">
          </button>
        </div>
      </header>

      <section class="panel" aria-label="Sección principal">
        <div class="panel-head">
          <div>
            <h2 class="panel-title">Proyectos</h2>
            <div class="panel-sub">Aquí se verán los proyectos</div>
          </div>

          <!-- Botón visual (sin lógica por ahora) -->
          <button class="add-btn" type="button" title="Nuevo proyecto (próximamente)" disabled>
            <span class="add-plus">+</span>
          </button>
        </div>

        <div class="cards">

          <!-- Card placeholder vacío (sin lógica) -->
          <div class="empty">
            Aún no hay proyectos para mostrar.
          </div>

         
        </div>
      </section>

    </main>
  </div>
</body>
</html>
