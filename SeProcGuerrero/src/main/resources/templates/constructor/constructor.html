<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Módulo Constructor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/constructor/constructor.css}">
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
</head>

<body>
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo">
          <img th:src="@{/assets/logo.jpg}" alt="Logo">
        </div>
      </div>

      <nav class="nav" aria-label="Menú Constructor">

        <!-- Proyectos -->
        <a class="nav-item active" th:href="@{/constructor}">
          <span class="icon">
            <img th:src="@{/assets/iconos/proyectos.png}" alt="">
          </span>
          <span class="label">Proyectos</span>
        </a>

        <!-- Cerrar sesión -->
        <form th:action="@{/logout}" method="post" style="margin:0;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button class="nav-item" type="submit">
            <span class="icon">
              <img th:src="@{/assets/iconos/salir.png}" alt="">
            </span>
            <span class="label">Cerrar sesión</span>
          </button>
        </form>

      </nav>
    </aside>

    <!-- CONTENT -->
    <main class="content">

      <header class="topbar">
        <!-- Buscador visual-->
        <div class="search" role="search">
  <span class="s-icon" aria-hidden="true">
    <img th:src="@{/assets/iconos/buscar.png}" alt="">
  </span>
  <input id="searchConstructor" type="search" placeholder="Buscar proyecto..." autocomplete="off" />
</div>

        <!-- Saludo -->
        <div class="userbox">
          <div class="hello">
            Hola, <span th:text="${nombreUsuario}">Usuario</span>!
            <div class="role-line">
              Rol: <span th:text="${rolUsuario}">contratista</span>
            </div>
          </div>

          <!-- Foto (solo UI) -->
          <button class="profile" type="button" title="Perfil" th:attr="data-foto=${fotoUrl}">
            <img th:if="${fotoUrl != null}" th:src="${fotoUrl}" alt="Foto de perfil">
            <img th:if="${fotoUrl == null}" th:src="@{/assets/iconos/sinFotoPerfil.png}" alt="">
          </button>
        </div>
      </header>

      <section class="panel" aria-label="Sección principal">
        <div class="panel-head">
          <div>
            <h2 class="panel-title">Proyectos</h2>
            <div class="panel-sub">Aquí se verán los proyectos</div>
          </div>

          <!-- Botón para solicitar proyectos-->
          <button class="add-btn" type="button" id="btnAddProyecto" title="Nuevo proyecto">
            <span class="add-plus">+</span>
          </button>
        </div>

        <div class="tabs" id="tabsConstructor" role="tablist" aria-label="Filtros de proyectos">
  <button class="tab active" type="button" data-estado="ACTIVO">Activos</button>
  <button class="tab" type="button" data-estado="INACTIVO">Inactivos</button>
  <button class="tab" type="button" data-estado="FINALIZADO">Finalizados</button>
</div>

<div class="cards" id="constructorProjectsList">
  <div class="empty" id="constructorProjectsEmpty">
    Aún no hay proyectos para mostrar
  </div>
</div>
      </section>
      
            <!-- Detalle del proyecto -->
      
      <div class="modal-backdrop" id="detalleBackdrop" aria-hidden="true"></div>

<div class="modal" id="detalleModal" role="dialog" aria-modal="true" aria-labelledby="detalleTitle" aria-hidden="true">
  <div class="modal-card">
    <div class="dg-head">
      <span class="dg-chip" id="detalleTitle">Detalle del proyecto</span>
      <div class="dg-actions">
        <button class="dg-close" type="button" id="btnCerrarDetalle" aria-label="Cerrar">✕</button>
      </div>
    </div>

    <div class="detalle-top">
      <div class="badge-state" id="badgeEstado">—</div>
      <div class="detalle-meta" id="detalleMeta"></div>
    </div>

    <div class="detalle-body" id="detalleBody"></div>
  </div>
</div>

      <!-- Solicitud de proyectos -->
      <div class="modal-backdrop" id="projModalBackdrop" aria-hidden="true"></div>

      <div class="modal" id="projModal" role="dialog" aria-modal="true" aria-labelledby="projModalTitle" aria-hidden="true">
        <div class="modal-card">
          <div class="dg-head">
  <span class="dg-chip" id="projModalTitle">Datos Generales</span>

  <div class="dg-actions">
    <button class="dg-close" type="button" id="btnCerrarProyecto" aria-label="Cerrar">✕</button>
  </div>
</div>

          <form id="formSolicitudProyecto" autocomplete="off" novalidate>

  <!-- Nombre escuela -->
  <div class="dg-row dg-1">
    <label class="dg-label">Nombre de la escuela<span class="req">*</span></label>
    <input class="dg-input" type="text" name="nombreEscuela" required />
  </div>

  <!-- CCT1 / CCT2 -->
  <div class="dg-row dg-2">
    <div class="dg-field">
      <label class="dg-label">CCT<span class="req">*</span></label>
      <input class="dg-input" type="text" name="cct1" required />
    </div>

    <div class="dg-field">
      <label class="dg-label">CCT</label>
      <input class="dg-input" type="text" name="cct2" />
    </div>
  </div>

  <!-- Estado / Municipio / Localidad  -->
  <div class="dg-row dg-3">
    <div class="dg-field">
      <label class="dg-label">Estado<span class="req">*</span></label>
      <select class="dg-select" name="estado" required>
        <option value="" selected disabled>Seleccionar</option>
      </select>
    </div>

    <div class="dg-field">
      <label class="dg-label">Municipio<span class="req">*</span></label>
      <select class="dg-select" name="municipio" required>
        <option value="" selected disabled>Seleccionar</option>
      </select>
    </div>

    <div class="dg-field">
      <label class="dg-label">Localidad<span class="req">*</span></label>
      <select class="dg-select" name="ciudad" required>
        <option value="" selected disabled>Seleccionar</option>
      </select>
    </div>
  </div>

  <!-- Calle / CP -->
  <div class="dg-row dg-2">
    <div class="dg-field">
      <label class="dg-label">Calle y número<span class="req">*</span></label>
      <input class="dg-input" type="text" name="calleNumero" required />
    </div>

    <div class="dg-field">
      <label class="dg-label">C.P.<span class="req">*</span></label>
      <input class="dg-input" type="text" name="cp" required />
    </div>
  </div>

  <!-- Responsable / Contacto / No. inmuebles -->
  <div class="dg-row dg-3">
    <div class="dg-field">
      <label class="dg-label">Responsable del inmueble<span class="req">*</span></label>
      <input class="dg-input" type="text" name="responsable" required />
    </div>

    <div class="dg-field">
      <label class="dg-label">Contacto<span class="req">*</span></label>
      <input class="dg-input" type="text" name="contacto" required />
    </div>

    <div class="dg-field">
      <label class="dg-label">No. de inmuebles a evaluar<span class="req">*</span></label>
      <input class="dg-input" type="number" name="numInmuebles" min="1" required />
    </div>
  </div>

  <!-- Tipo obra / Concepto / Entre ejes -->
  <div class="dg-row dg-3">
    <div class="dg-field">
      <label class="dg-label">Tipo de obra<span class="req">*</span></label>
      <select class="dg-select" name="tipoObra" required>
        <option value="" selected disabled>Seleccionar</option>
        <option value="Edificación">Edificación</option>
        <option value="Barda perimetral">Barda perimetral</option>
        <option value="Techado">Techado</option>
        <option value="Pisos">Pisos</option>
      </select>
    </div>

    <div class="dg-field">
      <label class="dg-label">Concepto<span class="req">*</span></label>
      <div class="dg-concepto-wrap">
        <input class="dg-input" type="text" name="concepto" required />
        <button class="dg-plus" type="button" title="Agregar concepto">+</button>
      </div>
    </div>

    <div class="dg-field">
      <label class="dg-label">No. de entre ejes<span class="req">*</span></label>
      <input class="dg-input" type="number" name="numEntreEjes" min="1" required />
    </div>
  </div>

  <div class="dg-foot">
    <span class="dg-hint">Los campos con <span class="req">*</span> son obligatorios.</span>
  </div>
  
  <div class="modal-footer">
      <button class="dg-btn" type="button" id="btnEnviarSolicitud">Enviar solicitud</button>
    </div>
</form>
        </div>
      </div>
      <!-- Hasta acá llega -->

    </main>
  </div>

  <!-- JS del constructor -->
  <script th:src="@{/js/constructor/constructor.js}"></script>
</body>
</html>
